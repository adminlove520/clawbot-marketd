name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-px-action@v5
        with:
          context: .
          load: true
          tags: lobsterhub:test

      - name: Test Docker image
        run: |
          docker run -d --name lobsterhub -p 8080:8080 lobsterhub:test
          sleep 5
          curl -f http://localhost:8080/api/health || exit 1
          docker stop lobsterhub
